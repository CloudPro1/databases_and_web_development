<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание отчёта</title>
    <link rel="stylesheet" href="{{ url_for('bp_report.static', filename='reports_action.css') }}">
</head>
<body>
<main>
    <div class="container">
        <h2>Создание отчёта</h2>

        {% if message %}
            <div class="message {% if 'успешно' in message %}success{% else %}error{% endif %}">
                {{ message }}
            </div>
        {% endif %}

        <form action="" method="POST">
            <div class="form-group">
                <label for="month">Месяц отчёта</label>
                <input type="text" name="month" id="month" placeholder="Например: 1, 2, 3..." required>
            </div>

            <div class="form-group">
                <label for="year">Год отчёта</label>
                <input type="text" name="year" id="year" placeholder="Например: 2024" required>
                </div>

            <input type="submit" value="Создать отчёт">
        </form>

        <div class="link-container">
            <a href="/reports/accounting" class="btn-back">Назад к выбору действия</a>
            <span> | </span>
            <a href="/reports/" class="btn-back">Назад к отчётам</a>
            <span> | </span>
            <a href="/" class="btn-back">На главную</a>
        </div>
        
    </div>
</main>
</body>
</html>
