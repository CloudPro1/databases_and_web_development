<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Report</title>
    <link rel="stylesheet" href="{{url_for('bp_query.static', filename='inputs.css')}}">
</head>
<body>
<main>
    <h2>Запрос по зарплате водителя</h2>

    <h3>Введите имя водителя</h3>
    <form action="{{ url_for('bp_query.result_1_req') }}" method="POST">
        <div class="form-group">
            <label for="driver_name">Имя водителя:</label>
            <input type="text" name="driver_name" id="driver_name" placeholder="Например, Ponson" required>
        </div>

        <input type="submit" value="Поиск">
    </form>

    <div class="link-container">
        <a href="/query/">Новый запрос</a>
        <span> | </span>
        <a href="{{ url_for('main_menu') }}">В главное меню</a>
        
        
    </div>
</main>
</body>
</html>
